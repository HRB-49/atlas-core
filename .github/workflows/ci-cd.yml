name: Core Automation Factory

on:
  push:
    branches:
      - main

jobs:
  continuous-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Source
        uses: actions/checkout@v4

      - name: Initialize Sterile Node Runtime
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install System Dependencies
        run: npm install

      - name: Execute Automated Quality Gates
        run: npm test
